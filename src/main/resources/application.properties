spring.application.name=jimbro-backend

# ─── Database ─────────────────────────────────────────────────────────────────
# LOCAL: uses MySQL fallback
# RENDER: set these env vars in Render dashboard:
#   DATABASE_URL  = jdbc:postgresql://<internal-host>:5432/<dbname>
#   DB_USERNAME   = <your-db-username>
#   DB_PASSWORD   = <your-db-password>
#   DB_DRIVER     = org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/jimbro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rushik}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Auto-detect dialect from driver or manual override
spring.jpa.database-platform=${JPA_DIALECT:}

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── CORS ────────────────────────────────────────────────────────────────────
# Frontend URL — set FRONTEND_URL env var on Render to your deployed frontend
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ─── Groq API ────────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}